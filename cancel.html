<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Cancelled</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f9f6f1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: #fff;
      border: 1px solid #e2ddd6;
      border-radius: 4px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 440px;
      text-align: center;
      box-shadow: 0 2px 40px rgba(15,14,13,0.07);
    }
    .icon {
      width: 64px; height: 64px;
      background: #e8e2da;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .icon svg { width: 32px; height: 32px; fill: #7a746c; }
    h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #0f0e0d; margin-bottom: 0.75rem; }
    p { color: #7a746c; font-size: 0.95rem; line-height: 1.6; }
    .back-btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.85rem 2rem;
      background: linear-gradient(135deg, #c8a45a, #a8843a);
      color: white;
      text-decoration: none;
      border-radius: 3px;
      font-size: 0.95rem;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </div>
    <h1>Payment Cancelled</h1>
    <p>No payment was taken. You can go back and try again whenever you're ready.</p>
    <a href="/" class="back-btn">Try Again</a>
  </div>
</body>
</html>
